spring.application.name=airline-server
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=airline-db
spring.data.mongodb.auto-index-creation=${SPRING_DATA_MONGODB_AUTO_INDEX_CREATION:true}

# Server Configuration
server.port=${PORT:10000}
server.address=0.0.0.0

# JWT Configuration
jwt.secret=airlineApplicationSecretKeyForJWTTokenGenerationAndValidation2026AirlineManagement
jwt.expiration=86400000

# Allow specific endpoints
spring.security.filter-chain.public=/airline/api/auth/signup,/airline/api/auth/login

# Logging
logging.level.com.airline=INFO
logging.level.org.springframework.security=INFO

# CORS Configuration
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=true

# Disable ALL Spring Security auto-config
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration